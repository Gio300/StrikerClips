name: Release desktop installers

# Triggered:
#   1) Push a tag like v0.1.0 → real release
#   2) Manual run from the Actions tab → dry run (artifacts only, no release)
#
# Output: GitHub Release with EXE / MSI (Windows), DMG (macOS), AppImage / DEB (Linux)
# attached. The marketing site's `/download` page links to the latest release URL
# via the `VITE_DOWNLOAD_*` env vars.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install JS deps
        run: npm ci

      - name: Build the web bundle
        run: npm run build

      - name: Build the desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-sign / notarize (set when we have a cert):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ReelOne ${{ github.ref_name }}"
          releaseBody: |
            See the [marketing site](https://reelone-marketing.example.com) for what's new.

            **Downloads:**
            - Windows — `.msi` or `.exe`
            - macOS — `.dmg` (Intel + Apple Silicon)
            - Linux — `.AppImage` or `.deb`
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: false
          args: ${{ matrix.args }}
